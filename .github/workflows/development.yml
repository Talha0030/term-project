name: Development Workflow

on:
  push:
    branches: [develop]

jobs:
  build-deploy-dev:
    runs-on: ubuntu-latest
    environment: development-env

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Lint HTML
        run: |
          npx htmlhint "**/*.html"

      - name: Lint CSS
        run: |
          npx stylelint "**/*.css"

      - name: Build Website
        run: npm run build

      - name: Deploy to GitHub Pages (Dev)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: dev.yourdomain.com  # Optional - remove this line if not using a custom domain
