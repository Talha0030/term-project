<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us | DevOps Startup</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800">

  <!-- Navbar -->
  <header class="bg-white shadow">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-indigo-600">DevOps Startup</h1>
      <nav class="space-x-4">
        <a href="home.html" class="hover:text-indigo-600">Home</a>
        <a href="about-us.html" class="hover:text-indigo-600">About</a>
        <a href="services.html" class="hover:text-indigo-600">Services</a>
        <a href="portfolio.html" class="hover:text-indigo-600">Portfolio</a>
        <a href="blog.html" class="hover:text-indigo-600">Blog</a>
        <a href="contact-us.html" class="text-indigo-600 font-medium">Contact</a>
      </nav>
    </div>
  </header>

  <!-- Contact Hero -->
  <section class="bg-indigo-600 text-white py-16 text-center">
    <h2 class="text-4xl font-bold mb-2">Contact Us</h2>
    <p class="text-lg">We’d love to hear from you!</p>
  </section>

  <!-- Contact Form -->
  <section class="py-16">
    <div class="max-w-3xl mx-auto px-4">
      <form class="bg-white p-8 rounded shadow space-y-6">
        <div>
          <label class="block text-sm font-medium mb-1">Name</label>
          <input type="text" class="w-full border border-gray-300 p-3 rounded" placeholder="Your Name" required>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Email</label>
          <input type="email" class="w-full border border-gray-300 p-3 rounded" placeholder="you@example.com" required>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Message</label>
          <textarea class="w-full border border-gray-300 p-3 rounded h-32" placeholder="How can we help?" required></textarea>
        </div>
        <button type="submit" class="bg-indigo-600 text-white px-6 py-3 rounded hover:bg-indigo-700 transition">Send Message</button>
      </form>
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-white border-t py-6 mt-12">
    <div class="max-w-6xl mx-auto px-4 flex justify-between items-center text-sm text-gray-600">
      <p>© 2025 DevOps Startup. All rights reserved.</p>
      <div class="space-x-4">
        <a href="#" class="hover:text-indigo-600">Privacy</a>
        <a href="#" class="hover:text-indigo-600">Terms</a>
      </div>
    </div>
  </footer>

</body>
</html>
